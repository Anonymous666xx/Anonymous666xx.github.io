name = "discord-club"
main = "worker.js"
compatibility_date = "2024-12-01"

kv_namespaces = [
  { binding = "DISCORD_CLUB_KV", id = "", preview_id = "" }
]

r2_buckets = [
  { binding = "DISCORD_CLUB_R2", bucket_name = "discord-club", preview_bucket_name = "discord-club-preview" }
]

[env.production]
vars = { ENVIRONMENT = "production" }

[env.preview]
vars = { ENVIRONMENT = "preview" }
